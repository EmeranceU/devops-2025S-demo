name: Linter

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      - uses: actions/checkout@v7.0.0

      - name: setup python
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run:
          python -m pip install --upgrade pip
          pip install -r requirements.txt


